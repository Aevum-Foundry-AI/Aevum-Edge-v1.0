<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1200" font-family="DejaVu Sans, Verdana, sans-serif">
  <defs>
    <marker id="aG" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#d4af37"/></marker>
    <marker id="aGr" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#2f6f43"/></marker>
    <marker id="aI" markerWidth="9" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#0a0a0a"/></marker>
  </defs>

  <rect x="0" y="0" width="1680" height="1200" fill="#faf6ee"/>

  <!-- header -->
  <text x="840" y="62" text-anchor="middle" font-size="46" font-weight="bold" fill="#0a0a0a">Aevum Edge</text>
  <text x="840" y="96" text-anchor="middle" font-size="21" fill="#6e4f0e">EdgeAgent: perceive at the edge &#183; reason in the cloud &#183; act locally</text>
  <line x1="60" y1="116" x2="1620" y2="116" stroke="#d4af37" stroke-width="2"/>

  <!-- ============ LEFT PANEL: ON THE WRIST ============ -->
  <rect x="50" y="146" width="560" height="474" rx="14" fill="#fffdf8" stroke="#0a0a0a" stroke-width="2"/>
  <text x="70" y="184" font-size="22" font-weight="bold" fill="#0a0a0a">ON THE WRIST</text>
  <text x="70" y="206" font-size="15" fill="#555555">Seeed XIAO ESP32-S3</text>

  <rect x="70" y="224" width="500" height="42" rx="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="320" y="250" text-anchor="middle" font-size="15.5" fill="#0a0a0a">MAX30102 &#183; PPG / heart rate &#183; 0x57</text>
  <rect x="70" y="274" width="500" height="42" rx="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="320" y="300" text-anchor="middle" font-size="15.5" fill="#0a0a0a">MPU-6050 &#183; motion (accel + gyro) &#183; 0x68</text>
  <rect x="70" y="324" width="500" height="42" rx="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="320" y="350" text-anchor="middle" font-size="15.5" fill="#0a0a0a">BME280 &#183; ambient &#176;C / %RH &#183; 0x76</text>

  <line x1="320" y1="366" x2="320" y2="384" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <rect x="170" y="386" width="300" height="36" rx="8" fill="#f4eedf" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="320" y="409" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0a0a0a">I&#178;C bus &#183; 3.3 V</text>

  <line x1="320" y1="422" x2="320" y2="440" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <rect x="90" y="442" width="460" height="52" rx="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="320" y="464" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0a0a0a">Feature extraction</text>
  <text x="320" y="484" text-anchor="middle" font-size="12" fill="#333333">HR &#183; motion index &#183; skin temp &#183; ambient temp / humidity</text>

  <line x1="320" y1="494" x2="320" y2="512" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <rect x="120" y="514" width="400" height="38" rx="8" fill="#fdf6e3" stroke="#d4af37" stroke-width="2.5"/>
  <text x="320" y="539" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0a0a0a">Consent gate &#183; fail-closed</text>

  <text x="70" y="578" font-size="13.5" font-style="italic" fill="#333333">Raw waveforms never leave the device.</text>
  <rect x="320" y="568" width="240" height="38" rx="8" fill="#ffffff" stroke="#777777" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="440" y="592" text-anchor="middle" font-size="12.5" fill="#444444">Offline &#8594; local fallback rule</text>

  <!-- ============ MIDDLE: LINKS ============ -->
  <line x1="612" y1="438" x2="1008" y2="438" stroke="#d4af37" stroke-width="3" marker-end="url(#aG)"/>
  <text x="810" y="414" text-anchor="middle" font-size="14.5" fill="#6e4f0e" font-weight="bold">HTTPS &#183; derived features</text>
  <text x="810" y="432" text-anchor="middle" font-size="14.5" fill="#6e4f0e" font-weight="bold">+ personal context (consented) &#8594;</text>

  <line x1="1008" y1="512" x2="612" y2="512" stroke="#2f6f43" stroke-width="2.5" marker-end="url(#aGr)"/>
  <text x="810" y="538" text-anchor="middle" font-size="14.5" fill="#2f6f43">&#8592; status &#183; nudge &#183; explanation</text>

  <!-- ============ RIGHT PANEL: ALIBABA CLOUD ============ -->
  <rect x="1010" y="146" width="620" height="474" rx="14" fill="#fffdf8" stroke="#0a0a0a" stroke-width="2"/>
  <text x="1030" y="184" font-size="22" font-weight="bold" fill="#0a0a0a">ALIBABA CLOUD</text>
  <text x="1030" y="206" font-size="14" fill="#555555">Function Compute &#183; serverless &#183; stateless (no database)</text>

  <rect x="1030" y="226" width="580" height="40" rx="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="1320" y="251" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0a0a0a">FastAPI service</text>

  <line x1="1320" y1="266" x2="1320" y2="284" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <rect x="1030" y="286" width="580" height="58" rx="8" fill="#e8f2ec" stroke="#2f6f43" stroke-width="2.5"/>
  <text x="1320" y="310" text-anchor="middle" font-size="17" font-weight="bold" fill="#0a0a0a">Qwen &#183; qwen3.7-plus</text>
  <text x="1320" y="331" text-anchor="middle" font-size="12.5" fill="#2f6f43">interprets readings vs your personal baseline + context</text>

  <line x1="1320" y1="344" x2="1320" y2="362" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <rect x="1030" y="364" width="580" height="52" rx="8" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="1320" y="386" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#0a0a0a">Structured JSON response</text>
  <text x="1320" y="406" text-anchor="middle" font-size="12.5" fill="#333333">status &#183; signals &#183; nudge &#183; explanation</text>

  <line x1="1320" y1="416" x2="1320" y2="434" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <rect x="1060" y="436" width="520" height="38" rx="8" fill="#fdf6e3" stroke="#d4af37" stroke-width="2.5"/>
  <text x="1320" y="461" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#0a0a0a">Diagnosis-free prompt + server-side guard</text>

  <text x="1030" y="512" font-size="13.5" font-style="italic" fill="#333333">Stateless &#183; logs no identity.</text>

  <!-- ============ DEVICE <-> APP arrows ============ -->
  <line x1="170" y1="688" x2="170" y2="622" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <line x1="430" y1="622" x2="430" y2="688" stroke="#0a0a0a" stroke-width="2" marker-end="url(#aI)"/>
  <text x="300" y="660" text-anchor="middle" font-size="13" fill="#444444">app &#8645; device</text>

  <!-- ============ COMPANION APP PANEL ============ -->
  <rect x="50" y="690" width="1580" height="252" rx="14" fill="#fffdf8" stroke="#0a0a0a" stroke-width="2"/>
  <text x="70" y="726" font-size="22" font-weight="bold" fill="#0a0a0a">COMPANION PHONE APP</text>
  <text x="475" y="726" font-size="15" fill="#555555">onboarding &#183; personalisation &#183; advice</text>
  <line x1="812" y1="744" x2="812" y2="922" stroke="#e0d8c4" stroke-width="1.5"/>

  <!-- left column: onboarding -->
  <text x="80" y="762" font-size="15.5" font-weight="bold" fill="#6e4f0e">Onboarding &amp; profile (one-time, editable)</text>
  <text x="80" y="790" font-size="13.5" fill="#222222">&#8226;&#160; Height &#183; weight &#183; age range</text>
  <text x="80" y="814" font-size="13.5" fill="#222222">&#8226;&#160; Activity: how often, type, intensity</text>
  <text x="80" y="838" font-size="13.5" fill="#222222">&#8226;&#160; Diet type &amp; patterns &#183; hydration</text>
  <text x="80" y="862" font-size="13.5" fill="#222222">&#8226;&#160; Health context you choose to share: physical &amp; mental (per-category consent)</text>
  <text x="80" y="886" font-size="13.5" fill="#222222">&#8226;&#160; Goals: move more &#183; sleep &#183; stress &#183; routine &#183; understand my signals</text>
  <text x="80" y="912" font-size="13.5" font-weight="bold" fill="#2f6f43">&#8594; builds your personal baseline + context (stored on device)</text>

  <!-- right column: what the app shows -->
  <text x="840" y="762" font-size="15.5" font-weight="bold" fill="#6e4f0e">What the app shows</text>
  <text x="840" y="790" font-size="13.5" fill="#222222">&#8226;&#160; Flag: steady / watch / elevated, vs your baseline</text>
  <text x="840" y="814" font-size="13.5" fill="#222222">&#8226;&#160; Plain-language explanation, citing your own numbers</text>
  <text x="840" y="838" font-size="13.5" fill="#222222">&#8226;&#160; General recommendations: food &#183; movement &#183; rest</text>
  <text x="840" y="862" font-size="13.5" fill="#222222">&#8226;&#160; Signpost: &#8220;consider seeing a clinician if this continues or you feel unwell&#8221;</text>
  <text x="840" y="886" font-size="13.5" fill="#222222">&#8226;&#160; Optional product links (e.g. supplements) with affiliate disclosure</text>
  <text x="840" y="912" font-size="13.5" font-weight="bold" fill="#8a1c0a">&#8226;&#160; Never names or infers a condition &#183; never treats a declared one</text>

  <!-- ============ FOOTER PILLARS ============ -->
  <line x1="60" y1="968" x2="1620" y2="968" stroke="#e0d8c4" stroke-width="1.5"/>
  <text x="60" y="1004" font-size="15" font-weight="bold" fill="#6e4f0e">EDGE&#8211;CLOUD ORCHESTRATION</text>
  <text x="60" y="1030" font-size="13" fill="#333333">Heavy signal work runs on-device;</text>
  <text x="60" y="1050" font-size="13" fill="#333333">only a few numbers cross the network.</text>

  <text x="600" y="1004" font-size="15" font-weight="bold" fill="#6e4f0e">PRIVACY-AWARE HANDLING</text>
  <text x="600" y="1030" font-size="13" fill="#333333">Derived features only; fail-closed</text>
  <text x="600" y="1050" font-size="13" fill="#333333">consent; nothing logged to identity.</text>

  <text x="1140" y="1004" font-size="15" font-weight="bold" fill="#6e4f0e">GRACEFUL DEGRADATION</text>
  <text x="1140" y="1030" font-size="13" fill="#333333">Offline, a local rule keeps it</text>
  <text x="1140" y="1050" font-size="13" fill="#333333">useful, the device never goes dark.</text>

  <text x="840" y="1110" text-anchor="middle" font-size="12" fill="#999999">Aevum Foundry AI Ltd &#183; Qwen Cloud Global AI Hackathon &#183; Track 5: EdgeAgent</text>
</svg>
